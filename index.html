<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css">

    <title>Frontend Mentor | [Challenge Name Here]</title>

  </head>
  <body>
    <div class="container">
      <img src="./images/bg-top.svg" alt="" class="top-pattern">
      <header class="header">
        <h1 class="title">Our Pricing</h1>
        <div class="selector">
          <p>Annually</p>
           <label class="switch">
            <input type="checkbox" id="toggle">
            <div class="checkbox-slider"></div>
          </label>
          <p>Monthly</p>
        </div>
      </header>
      <main class="cards">
        <article class="card">
          <h2 class="plan__tipe">Basic</h2>
          <p class="price">&dollar;<strong>19.99</strong></p>
          <ul class="plan__description">
            <li>500 GB Storage</li>
            <li>2 Users Allowed</li>
            <li>Send up to 3 GB</li>
          </ul>
          <button>Learn More</button>
        </article>
        <article class="card">
          <h2 class="plan__tipe">Professional</h2>
          <p class="price">&dollar;<strong>24.99</strong></p>
          <ul class="plan__description">
            <li>1 TB Storage</li>
            <li>5 Users Allowed</li>
            <li>Send up to 10 GB</li>
          </ul>
          <button>Learn More</button>
        </article>
        <article class="card">
          <h2 class="plan__tipe">Master</h2>
          <p class="price">&dollar;<strong>39.99</strong></p>
          <ul class="plan__description">
            <li>2 TB Storage</li>
            <li>10 Users Allowed</li>
            <li>Send up to 10 GB</li>
          </ul>
          <button>Learn More</button>
        </article>

      </main>
    </div>
    
  </body>
</html>
